apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: monitor-agent
spec:
  selector:
    matchLabels:
      app: monitor

  template:
    metadata:
      labels:
        app: monitor
    spec:
      containers:
        - name: node-exporte
          image: prom/node-exporter
          ports:
            - containerPort: 9100
