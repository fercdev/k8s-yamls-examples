apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment-app
  labels:
    app: myapp
spec:
  replicas: 3
  revisionHistoryLimit: 5
  #progressDeadlineSeconds: 500

  selector:
    matchLabels:
      app: myapp
  
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
        - name: app-container
          image: nginx:alpine
          ports:
            - containerPort: 80
          resources:
            limits:
              cpu: "500m"
              memory: 412Mi
            requests:
              cpu: "250m"
              memory: "256Mi"
          env:
            - name: ENV
              value: prod
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5