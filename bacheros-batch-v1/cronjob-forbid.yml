apiVersion: batch/v1
kind: CronJob
metadata:
  name: forbid-logs
spec:
  schedule: "* * * * *" # Ejecutar cada minut
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: logger
            image: busybox
            command: ["sh", "-c", "echo Forbid && sleep 70 && echo Fin"]
          restartPolicy: Never