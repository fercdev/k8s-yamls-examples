apiVersion: batch/v1
kind: Job
metadata:
  name: ejemplo-job
spec:
  completions: 1
  parallelism: 1
  backoffLimit: 3
  template:
    spec:
      containers:
        - name: mi-job-container
          image: busybox
          command: ["sh", "-c", "echo hola mundo desde mi Job && sleep 5"]
      restartPolicy: Never