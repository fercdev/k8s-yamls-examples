apiVersion: v1
kind: Secret
metadata:
  name: secret-yml
  # namespace: default  --> indicar el espacio logico donde se crearia el recurso
  labels:
    app: mi-app
  annotations:
    description: "Secreto de ejemplo con todos los atributos"

type: Opaque # (Opaque => default = generico) | kubernetes.io/basic-auth | kubernetes.io/ssh-auth

data:  ## tener en cuenta que los valores son con base64
  USER: YWRtaW4=  ## admin
  PASS: YWRtaW5wYXNzMTIz ## adminpass123

stringData:
  API_KEY: "mi-api-key"
  TOKEN: "asdasb12312asdas"


# immutable: true # es (inmutable por defecto = true)  