apiVersion: v1
kind: Pod
metadata:
  name: nginx-pod
  labels:
    app: nginx-demo
spec:
  containers:
  - name: nginx
    image: nginx:alpine
    ports:
      - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-clusterip
spec:
  type: ClusterIP

  selector:
    app: nginx-demo
  
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: v1
kind: Pod
metadata:
  name: test-client
spec:
  containers:
  - name: client
    image: busybox
    command: ["sh", "-c", "sleep 3600"]