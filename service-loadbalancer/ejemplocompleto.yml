apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deploy
spec:
  replicas: 2

  selector:
    matchLabels:
      app: nginx-lb
  
  template:
    metadata:
      labels:
        app: nginx-lb

    spec:
      containers:
        - name: nginx-container
          image: nginx:alpine
          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: nginx-loadbalancer
spec:
  type: LoadBalancer

  selector:
    app: nginx-lb
  
  ports:
  - port: 90
    targetPort: 80
