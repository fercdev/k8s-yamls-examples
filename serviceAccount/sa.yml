apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-faster
---
apiVersion: v1
kind: Pod
metadata:
  name: pod-faster
spec:
  serviceAccountName: sa-faster
  containers:
  - name: kubectl-container
    image: alpine/kubectl
    command: ["sleep", "3600"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-reader
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pod-reader-binding
subjects:
  - kind: ServiceAccount
    name: sa-faster
    namespace: default
roleRef:
  kind: Role
  name: pod-reader
  apiGroup: rbac.authorization.k8s.io