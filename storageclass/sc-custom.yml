apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: faster
provisioner: k8s.io/minikube-hostpath
reclaimPolicy: Retain
volumeBindingMode: Immediate
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-faster
spec:
  storageClassName: faster
  resources:
    requests:
      storage: 1Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-faster
spec:
  selector:
    matchLabels:
      app: app-faster
  template:
    metadata:
      labels:
        app: app-faster
    spec:
      containers:
      - name: busybox-container
        image: busybox
        command: ["/bin/sh", "-c"]
        args:
          - echo "Hola custom storageClass" > /data/test.txt && sleep 3600
        volumeMounts:
          - name: my-volume
            mountPath: /data
      volumes:
        - name: my-volume
          persistentVolumeClaim:
            claimName: pvc-faster